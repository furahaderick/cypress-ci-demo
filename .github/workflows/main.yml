name: cypress e2e tests

on:
    push:
        branches: 
            - main
    pull_request:
        branches: 
            - main

jobs:
    cypress-run:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            
            - name: Cypress run
              uses: cypress-io/github-action@v7
              with:
                build: npm run build
                start: npm start
                wait-on: http://localhost:3000
                browser: chrome
